# RotMG Extractor configuration (Go).
# All values shown are the defaults; the file may be omitted entirely.

source:
  # "local"  extracts a build already installed on disk.
  # "remote" downloads builds from the live CDN.
  mode: remote
  # Remote mode: which platforms to watch/download. Defaults to Windows only;
  # add "macos" to also watch the macOS build.
  #   platforms: [windows, macos]
  platforms: [windows]
  # The installed build root: an .app bundle on macOS, or the game folder
  # containing RotMGExalt_Data on Windows/Linux. Leave blank to auto-discover
  # from OS-specific default install locations.
  local_path: ""
  # Copy the entire Data dir into the output tree (slow, ~750 MB). Off by
  # default: extraction reads directly from the source install.
  snapshot: false
  # Copy the native game binaries (GameAssembly/UnityPlayer) and
  # global-metadata.dat into the output (~130 MB). These are also scanned for
  # the build version. On by default.
  copy_game_files: true
  # Remote mode: when false (default) download only the essential files
  # (binaries, metadata, Unity .assets) — ~80% smaller than a full build, which
  # is mostly texture/audio data we don't extract. Set true for everything.
  full_download: false
  # Keep build files on disk and only re-download files whose checksum changed
  # between builds. Saves bandwidth (unchanged binaries aren't re-fetched) but
  # keeps ~500 MB/platform on disk. Off by default (downloads go to temp).
  incremental: true

build:
  # Fallback Exalt version, used only when it can't be detected from the game
  # metadata. The version is normally auto-detected (e.g. 6.11.0.1.0).
  version_override: "6.11.0.1.0"

extraction:
  # "native"      pure-Go TextAsset parser, no external binary (game XML/JSON).
  # "assetripper" full asset export (textures, sprites, meshes, ...) via the
  #               bundled AssetRipper binary configured below.
  backend: native
  # Produce a decrypted global-metadata.dat for il2cpp dumping. Automatically
  # skipped when the metadata is already valid (the macOS build ships it
  # decrypted). On by default.
  decrypt_metadata: true

il2cpp:
  # Run IL2CPP processing tools on GameAssembly and global-metadata.dat
  enabled: true
  backend: "il2cppdumper"
  # When false, Cpp2IL failures are logged but the build still publishes.
  required: false
  # Timeout for each Cpp2IL command. Set 0 to disable.
  timeout_minutes: 10
  il2cppdumper:
    # Directory holding the Il2CppDumper binary.
    dir: tools/il2cpp/il2cppdumper
    # Skip auto detection of Unity version and use this version.
    #force_version: 29
    # Leave the existing config.json next to the binary untouched.
    #keep_config: true
    # List of extra command line arguments to pass while running.
    extra_args: []
  cpp2il:
    # Directory holding the Cpp2IL native binary, or the binary path itself.
    # See docs/il2cpp-reference.md.
    dir: tools/il2cpp/cpp2il
    # Optional absolute/relative binary override. Empty resolves by OS:
    # Cpp2IL-Win.exe, Cpp2IL-Mac, Cpp2IL-Linux, or Cpp2IL.
    binary: ""
    # Full dump mode asks Cpp2IL for every available output format and runs
    # each one into il2cpp_dump/cpp2il/<format>/.
    full_dump: true
    # Fallback formats if Cpp2IL cannot list formats, or the explicit list when
    # full_dump is false. Add formats from `Cpp2IL --list-output-formats`.
    formats: [dll_il_recovery]
    # Optional processing layers, e.g. [attributeinjector].
    processors: []
    # Extra arguments appended to every Cpp2IL invocation.
    extra_args: []
    verbose: false
    # In full dump mode, keep trying later formats after one format fails.
    continue_on_fail: true

assetripper:
  # Directory holding the AssetRipper binary (relative to the working dir). The
  # OS-specific executable name (AssetRipper.GUI.Free or .exe) is resolved
  # within it. Only used when extraction.backend is "assetripper". See
  # tools/assetripper/README.md to obtain the right build for your platform.
  dir: tools/assetripper
  # Local port AssetRipper hosts its API on. 0 picks a free port automatically.
  port: 0
  # "primary" exports decoded assets only (fast); "project" exports a full
  # reconstructed Unity project.
  export: primary

notify:
  discord:
    # Send a Discord webhook embed when a new build is published.
    enabled: false
    webhook_url: ""
    # Optional role to ping (the numeric role ID), e.g. "123456789012345678".
    role_id: ""

poll:
  # Minutes between polling passes that check for new builds.
  client_check_delay_minutes: 5
  launcher_check_delay_minutes: 30

output:
  # Root directory for downloaded, work-in-progress and published files.
  dir: ./output
  # Retain at most this many versioned builds per platform/build type; older
  # ones are pruned after publishing. 0 keeps every build.
  keep_builds: 0

logging:
  # debug | info | warn | error
  level: debug
  console: true
  colors: true
  file: true
